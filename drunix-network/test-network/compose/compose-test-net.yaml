volumes:
  orderer.example.com:
  peer0.org1.example.com:
  peer0.org2.example.com:
  peer1.org1.example.com:
  peer1.org2.example.com:
  peer2.org1.example.com:
  peer2.org2.example.com:

networks:
  test:
    name: drunix_test

services:

  orderer.example.com:
    container_name: orderer.example.com
    image: npcioss/drunix-orderer:1.0.0
    labels:
      service: drunix
    environment:
      - ORDERER_SNAPSHOTINTERVAL="16777216"
      - ORDERER_CONSENSUS_WALDIR=/tmp/drunix-sharding/data_store/orderer/etcdraft/wal
      - ORDERER_CONSENSUS_SNAPDIR=/tmp/drunix-sharding/data_store/orderer/etcdraft/snapshot
      - ORDERER_GENERAL_MVCCENABLED=false
      - ORDERER_FILELEDGER_KVSTORE="/tmp/drunix-sharding/dev_setup/data_store/orderer/kvstore"
      - ORDERER_FILELEDGER_LOCATION="/tmp/drunix-sharding/dev_setup/data_store/orderer/blocks"
      - ORDERER_FILELEDGER_KVSTORECACHESIZE=2147483
      - ORDERER_FILELEDGER_ORGBLOCKCACHESIZE=107374
      - ORDERER_GENERAL_MAXBATCHSIZE=5000
      - ORDERER_GENERAL_BLOCKCUTTIME=2
 
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      # enabled TLS
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_OPERATIONS_LISTENADDRESS=orderer.example.com:9443
      - ORDERER_METRICS_PROVIDER=prometheus
    working_dir: /root
    command: orderer
    volumes:
        - ../organizations/ordererOrganizations/example.com/orderers/orderer.example.com/msp:/var/hyperledger/orderer/msp
        - ../organizations/ordererOrganizations/example.com/orderers/orderer.example.com/tls/:/var/hyperledger/orderer/tls
        - orderer.example.com:/var/hyperledger/production/orderer
    ports:
      - 7050:7050
      - 7053:7053
      - 9443:9443
    networks:
      - test

  #LP(Lite Peer)
  peer0.org1.example.com:
    container_name: lp1.org1
    image: npcioss/drunix-peer:1.0.0
    labels:
      service: drunix
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock #docker endpoint
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_test

      - FABRIC_CFG_PATH=/etc/hyperledger/peercfg
      - FABRIC_LOGGING_SPEC=INFO
      #- FABRIC_LOGGING_SPEC=DEBUG
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      # Peer specific variables
      - CORE_PEER_ID=peer0.org1.example.com
      - CORE_PEER_ADDRESS=peer0.org1.example.com:7051
      - CORE_PEER_LISTENADDRESS=peer0.org1.example.com:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1.example.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=peer0.org1.example.com:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.example.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1.example.com:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.org1.example.com:9444
      - CORE_METRICS_PROVIDER=prometheus
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0org1"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
      - CORE_PEER_GOSSIP_ORGLEADER=true
      - CORE_PEER_GOSSIP_STATE_ENABLED=false
      - CORE_PEER_GOSSIP_USELEADERELECTION=false
      - CORE_PEER_DELIVERYCLIENT_BLOCKGOSSIPENABLED=false
      - CORE_PEER_LITEPEER_ENABLED=true
      #KVSTORE for transient store
      - CORE_PEER_KVSTORE_ENABLED=true
      - CORE_PEER_KVSTORE_ADDRESS=hlf_keydb_org1msp:6379
      - CORE_PEER_KVSTORE_PASSWORD=
      - CORE_PEER_KVSTORE_POOLFIFO=true
      - CORE_PEER_KVSTORE_POOLSIZE=30
      - CORE_PEER_KVSTORE_MINIDLECONNS=30
      - CORE_PEER_KVSTORE_MAXACTIVECONNS=30
      - CORE_PEER_KVSTORE_CONNMAXIDLETIME=10m
      - CORE_PEER_KVSTORE_DB=0
      - CORE_PEER_KVSTORE_REPLICAADDRESS=hlf_keydb_org1msp:6379
      #StateDatabase
      - CORE_LEDGER_STATE_STATEDATABASE=sqldb
      - CORE_LEDGER_STATE_SQLDBCONFIG_ADDRESS=yugabyte-org1
      - CORE_LEDGER_STATE_SQLDBCONFIG_PORT=5433
      - CORE_LEDGER_STATE_SQLDBCONFIG_DBNAME=yugabyte
      - CORE_LEDGER_STATE_SQLDBCONFIG_USER=yugabyte
      - CORE_LEDGER_STATE_SQLDBCONFIG_PASSWORD=yugabyte
      - CORE_LEDGER_STATE_SQLDBCONFIG_SSLMODE=disable
      - CORE_LEDGER_STATE_SQLDBCONFIG_PREPARESTATEMENT=true
      - CORE_LEDGER_STATE_SQLDBCONFIG_BATCHSIZE=100
      - CORE_LEDGER_STATE_SQLDBCONFIG_MAXIDLECONNS=50
      - CORE_LEDGER_STATE_SQLDBCONFIG_MAXOPENCONNS=50
      - CORE_LEDGER_STATE_SQLDBCONFIG_CONNMAXLIFETIME=60m
      #ComittingPeer(CP)
      - CORE_PEER_COMMITTINGPEER_ID=peer1.org1.example.com
      # - CORE_PEER_COMMITTINGPEER_ID=peer4.org1.example.com
      - CORE_PEER_COMMITTINGPEER_ENDPOINT=dns:///peer1.org1.example.com:7061
      # - CORE_PEER_COMMITTINGPEER_ENDPOINT=dns:///peer4.org1.example.com:7081
      - CORE_PEER_COMMITTINGPEER_TLSCERTPATH=/etc/hyperledger/fabric/cp/tls/ca.crt
      - CORE_PEER_COMMITTINGPEER_FORWARDCOMMITSTATUSREQUESTS_ENABLED=true

    volumes:
      - ../organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com:/etc/hyperledger/fabric
      - peer0.org1.example.com:/var/hyperledger/production
      - ${DOCKER_SOCK}:/host/var/run/docker.sock # docker sock mounted

      # - ../organizations/peerOrganizations/org1.example.com/peers/peer4.org1.example.com/tls:/etc/hyperledger/fabric/cp/tls
      - ../organizations/peerOrganizations/org1.example.com/peers/peer1.org1.example.com/tls:/etc/hyperledger/fabric/cp/tls
    working_dir: /root
    command: peer node start
    ports:
      - 7051:7051
      - 9444:9444
    networks:
      - test
  #CP(Committing Peer)
  peer1.org1.example.com:
    container_name: cp.org1
    image: npcioss/drunix-peer:1.0.0
    labels:
      service: drunix
    environment:
      - FABRIC_CFG_PATH=/etc/hyperledger/peercfg
      - FABRIC_LOGGING_SPEC=INFO
      #- FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
